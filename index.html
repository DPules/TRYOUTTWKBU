<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRYOUT TWK Paskibraka</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <img
        src="img/Paskibra Logo - Logo Vector Online 2019.jfif"
        class="header"
      />

      <div class="info">
        <h2>Data Peserta</h2>
        <input id="nama" placeholder="Nama Lengkap" />
        <input id="sekolah" placeholder="Asal Sekolah" />
        <select id="gender">
          <option value="">-- Pilih Jenis Kelamin --</option>
          <option value="Laki-Laki"> Laki-Laki</option>
          <option value="Perempuan"> Perempuan</option>
          
        <input id="tinggibadan" placeholder="Tinggi Badan (CM)" />
        <input id="beratbadan" placeholder="Berat Badan (KG)" />
        
        <select id="daerah">
          
        
        
          <option value="">-- Pilih Kecamatan --</option>
          <option value="Air Besi">Air Besi</option>
          <option value="Air Napal">Air Napal</option>
          <option value="Air Padang">Air Padang</option>
          <option value="Arga Makmur">Arga Makmur</option>
          <option value="Arma Jaya">Arma Jaya</option>
          <option value="Batik Nau">Batik Nau</option>
          <option value="Enggano">Enggano</option>
          <option value="Giri Mulya">Giri Mulya</option>
          <option value="Hulu Palik">Hulu Palik</option>
          <option value="Kerkap">Kerkap</option>
          <option value="Ketahun">Ketahun</option>
          <option value="Lais">Lais</option>
          <option value="Marga Sakti Sebelat">Marga Sakti Sebelat</option>
          <option value="Napal Putih">Napal Putih</option>
          <option value="Padang Jaya">Padang Jaya</option>
          <option value="Putri Hijau">Putri Hijau</option>
          <option value="Tanjung Agung Palik">Tanjung Agung Palik</option>
          <option value="Ulok Kupai">Ulok Kupai</option>
        </select>
        <button onclick="mulaiUjian()">Mulai Ujian</button>
      </div>

      <div class="timer hidden"><span id="time">10:00</span></div>

      <div class="progress-box hidden">
        <div class="progress"><div id="progressBar"></div></div>
        <small id="progressText">0 / 20</small>
      </div>

      <div id="navSoal" class="nav-soal hidden"></div>

      <form id="quizForm" class="hidden">
        <div id="soalContainer"></div>

        <div class="nav-btn">
          <button type="button" onclick="sebelumnya()">⬅ Kembali</button>
          <button type="button" id="nextBtn" onclick="berikutnya()">
            Berikutnya ➡
          </button>
        </div>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
